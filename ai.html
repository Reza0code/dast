<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دست‌یاری AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <div class="logo">دست‌یاری AI</div>
      <ul class="nav-links">
        <li><a href="index.html">خانه</a></li>
        <li><a href="index.html#rules">قوانین</a></li>
        <li><a href="index.html#contact">تماس</a></li>
      </ul>
    </nav>
  </header>

  <main class="chat-page">
    <section class="chat-box">
      <h1>گفت‌وگو با دست‌یاری AI</h1>
      <p>
        این بخش برای پاسخ به پرسش‌های عمومی درباره دست‌یاری، عضویت، تماس و قوانین ساخته شده است.
      </p>

      <div id="chatMessages" class="chat-messages">
        <div class="bot-message">
          سلام، من دست‌یاری AI هستم. چطور می‌توانم کمک کنم؟
        </div>
      </div>

      <form id="chatForm" class="chat-form">
        <input id="questionInput" type="text" placeholder="پرسش خود را بنویسید..." required />
        <button type="submit">ارسال</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
